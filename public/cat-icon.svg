<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .cat-body { fill: #6B7280; }
      .cat-face { fill: #9CA3AF; }
      .cat-eye { fill: #1F2937; }
      .cat-nose { fill: #EC4899; }
    </style>
  </defs>
  <!-- Ears -->
  <polygon points="25,35 20,15 35,25" class="cat-body"/>
  <polygon points="75,35 80,15 65,25" class="cat-body"/>
  <!-- Head -->
  <ellipse cx="50" cy="55" rx="35" ry="30" class="cat-body"/>
  <ellipse cx="50" cy="58" rx="28" ry="24" class="cat-face"/>
  <!-- Eyes -->
  <ellipse cx="38" cy="52" rx="5" ry="7" class="cat-eye"/>
  <ellipse cx="62" cy="52" rx="5" ry="7" class="cat-eye"/>
  <!-- Nose -->
  <ellipse cx="47" cy="62" rx="2" ry="1.5" class="cat-nose"/>
  <ellipse cx="53" cy="62" rx="2" ry="1.5" class="cat-nose"/>
  <!-- Mouth -->
  <path d="M 45 68 Q 50 72 55 68" stroke="#1F2937" stroke-width="1.5" fill="none"/>
  <!-- Whiskers -->
  <line x1="20" y1="60" x2="35" y2="62" stroke="#6B7280" stroke-width="1"/>
  <line x1="20" y1="65" x2="35" y2="65" stroke="#6B7280" stroke-width="1"/>
  <line x1="80" y1="60" x2="65" y2="62" stroke="#6B7280" stroke-width="1"/>
  <line x1="80" y1="65" x2="65" y2="65" stroke="#6B7280" stroke-width="1"/>
</svg>
